services:
  backend:
    build:
      context: ./TerraCart-BackendMain
      dockerfile: Dockerfile
    container_name: terracart-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./TerraCart-Frontend
      dockerfile: Dockerfile
    container_name: terracart-frontend
    ports:
      - "3000:5173"

  admin:
    build:
      context: ./TerraCart-FrontendAdmin
      dockerfile: Dockerfile
    container_name: terracart-admin
    ports:
      - "3001:5173"

  mongodb:
    image: mongo:6
    container_name: terracart-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: