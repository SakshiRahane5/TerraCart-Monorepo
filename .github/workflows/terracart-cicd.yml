name: TerraCart CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/terracart-backend:latest ./TerraCart-BackendMain
          docker push ${{ secrets.DOCKER_USERNAME }}/terracart-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/terracart-frontend:latest ./TerraCart-Frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/terracart-frontend:latest

      - name: Build and push admin image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/terracart-admin:latest ./TerraCart-FrontendAdmin
          docker push ${{ secrets.DOCKER_USERNAME }}/terracart-admin:latest