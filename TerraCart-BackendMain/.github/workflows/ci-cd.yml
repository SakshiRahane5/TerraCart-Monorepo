name: Backend CI/CD

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

env:
  NODE_VERSION: "20"
  RUN_INTEGRATION_TESTS: "false"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Integration tests (optional)
        if: ${{ env.RUN_INTEGRATION_TESTS == 'true' }}
        run: npm run test:integration

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy webhook
        run: curl -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_STAGING }}"

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy webhook
        run: curl -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_PROD }}"
