# Render Blueprint Configuration
# This file can be used to deploy multiple services at once using Render Blueprints
# Go to: https://dashboard.render.com/blueprints

services:
  # Node.js Backend API
  - type: web
    name: sarva-cafe-backend
    env: node
    region: oregon # Change to your preferred region
    plan: free # Change to 'starter' or 'standard' for paid plans
    buildCommand: npm install
    startCommand: node server.js
    # rootDir not needed - backend files are at repository root
    envVars:
      # PORT is automatically set by Render - no need to specify
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Generate a random value
      - key: SIGNED_URL_SECRET
        generateValue: true
      - key: API_BASE_URL
        fromService:
          type: web
          name: sarva-cafe-backend
          property: host
      - key: ALLOWED_ORIGINS
        value: "https://terra-cart-admin-frontend.vercel.app,https://terra-cart-frontend-admin.vercel.app,https://terra-cart-frontend-eta.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175" # Admin and Customer frontend URLs + localhost for local testing
      - key: ALLOW_PUBLIC_UPLOADS
        value: "false"
      - key: MAX_FILE_SIZE
        value: "10"
      - key: DISABLE_RATE_LIMIT
        value: "false"
      - key: RATE_LIMIT_API
        value: "500"
      - key: RATE_LIMIT_LOGIN
        value: "10000" # Effectively disabled - very high limit
      - key: RATE_LIMIT_UPLOAD
        value: "50"
      - key: ENABLE_REQUEST_LOGGING
        value: "false"
      - key: FORCE_HTTPS
        value: "true"
      - key: SESSION_TIMEOUT
        value: "60"

  # Flask Backend API
  - type: web
    name: sarva-cafe-flask
    env: python
    region: oregon # Change to your preferred region
    plan: free # Change to 'starter' or 'standard' for paid plans
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    rootDir: backend-flask
    envVars:
      - key: PORT
        value: 5050
      - key: FLASK_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false # Set this manually if needed

# Note: Frontend apps should be deployed on Vercel
# Render Blueprints don't support static sites as well as Vercel does

