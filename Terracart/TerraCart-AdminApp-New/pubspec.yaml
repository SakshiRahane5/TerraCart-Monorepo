name: terra_admin_app
description: "TeraCard Staff App - A comprehensive mobile application for food kiosk staff management."
publish_to: 'none'

version: 1.0.10+10

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^2.30.0
  firebase_messaging: ^14.9.0
  flutter_local_notifications: ^17.2.4
  vibration: ^3.1.3
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_animate: ^4.3.0
  http: ^1.2.0
  socket_io_client: ^2.0.3+1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^5.2.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  esc_pos_utils: ^1.1.0
  video_player: ^2.9.2
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.5
  open_filex: ^4.6.0
  restart_app: ^1.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/TerraCartVideo.mp4
    - assets/TerraCartGif.gif
    - assets/TerraCartLogo.png
    - assets/TerraNewAppLogo_icon.png

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf

flutter_icons:
  android: true
  ios: true
  image_path: assets/TerraNewAppLogo_icon.png
  adaptive_icon_foreground: assets/TerraNewAppLogo_icon.png
  adaptive_icon_background: "#E77338"
  min_sdk_android: 21
